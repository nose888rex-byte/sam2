<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corazón Animado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Corazón principal */
        .heart {
            position: relative;
            width: 150px;
            height: 135px;
            cursor: pointer;
            animation: heartbeat 1.2s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(255, 0, 80, 0.6));
            z-index: 10;
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            top: 0;
            width: 75px;
            height: 120px;
            background: linear-gradient(180deg, #ff0050 0%, #ff3366 50%, #ff6b8a 100%);
            border-radius: 75px 75px 0 0;
        }

        .heart::before {
            left: 75px;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .heart::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        /* Brillo interno del corazón */
        .heart-shine {
            position: absolute;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%);
            border-radius: 50%;
            top: 25px;
            left: 35px;
            z-index: 11;
            animation: shine 2s ease-in-out infinite;
        }

        /* Anillos orbitales */
        .orbit {
            position: absolute;
            border: 2px solid transparent;
            border-radius: 50%;
            animation: rotate 8s linear infinite;
        }

        .orbit:nth-child(1) {
            width: 250px;
            height: 250px;
            border-top-color: rgba(255, 0, 80, 0.5);
            border-right-color: rgba(255, 0, 80, 0.3);
            animation-duration: 6s;
        }

        .orbit:nth-child(2) {
            width: 300px;
            height: 300px;
            border-bottom-color: rgba(255, 100, 150, 0.4);
            border-left-color: rgba(255, 100, 150, 0.2);
            animation-duration: 8s;
            animation-direction: reverse;
        }

        .orbit:nth-child(3) {
            width: 350px;
            height: 350px;
            border-top-color: rgba(255, 50, 100, 0.3);
            animation-duration: 10s;
        }

        /* Partículas flotantes */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #ff0050;
            border-radius: 50%;
            opacity: 0;
            animation: float 4s ease-in-out infinite;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 0.5s; }
        .particle:nth-child(3) { left: 30%; animation-delay: 1s; }
        .particle:nth-child(4) { left: 40%; animation-delay: 1.5s; }
        .particle:nth-child(5) { left: 50%; animation-delay: 2s; }
        .particle:nth-child(6) { left: 60%; animation-delay: 2.5s; }
        .particle:nth-child(7) { left: 70%; animation-delay: 3s; }
        .particle:nth-child(8) { left: 80%; animation-delay: 3.5s; }
        .particle:nth-child(9) { left: 90%; animation-delay: 0.3s; }
        .particle:nth-child(10) { left: 15%; animation-delay: 0.8s; }

        /* Mini corazones flotantes */
        .mini-heart {
            position: absolute;
            opacity: 0;
            animation: floatHeart 6s ease-in-out infinite;
        }

        .mini-heart::before,
        .mini-heart::after {
            content: '';
            position: absolute;
            background: linear-gradient(180deg, #ff6b8a 0%, #ff0050 100%);
        }

        .mini-heart::before {
            width: 15px;
            height: 24px;
            border-radius: 15px 15px 0 0;
            left: 15px;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .mini-heart::after {
            width: 15px;
            height: 24px;
            border-radius: 15px 15px 0 0;
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        .mini-heart:nth-child(1) { left: 5%; animation-delay: 0s; }
        .mini-heart:nth-child(2) { left: 25%; animation-delay: 1s; }
        .mini-heart:nth-child(3) { left: 45%; animation-delay: 2s; }
        .mini-heart:nth-child(4) { left: 65%; animation-delay: 3s; }
        .mini-heart:nth-child(5) { left: 85%; animation-delay: 4s; }

        /* Ondas de pulso */
        .pulse-ring {
            position: absolute;
            border: 3px solid rgba(255, 0, 80, 0.6);
            border-radius: 50%;
            animation: pulse 2s ease-out infinite;
        }

        .pulse-ring:nth-child(1) { animation-delay: 0s; }
        .pulse-ring:nth-child(2) { animation-delay: 0.5s; }
        .pulse-ring:nth-child(3) { animation-delay: 1s; }

        /* Electrocardiograma */
        .ecg-container {
            position: absolute;
            bottom: -80px;
            width: 300px;
            height: 60px;
            overflow: hidden;
        }

        .ecg-line {
            stroke: #ff0050;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            animation: ecgDraw 2s linear infinite;
            filter: drop-shadow(0 0 5px #ff0050);
        }

        /* Texto animado */
        .love-text {
            position: absolute;
            bottom: -130px;
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(90deg, #ff0050, #ff6b8a, #ff0050);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientText 3s linear infinite;
            letter-spacing: 8px;
        }

        /* Estrellas de fondo */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }

        /* Efecto de explosión al hacer click */
        .explosion {
            position: absolute;
            pointer-events: none;
        }

        .explosion-particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: explode 1s ease-out forwards;
        }

        /* Keyframes */
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); }
            60% { transform: scale(1); }
        }

        @keyframes shine {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.2); }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes float {
            0% {
                bottom: -10px;
                opacity: 0;
                transform: translateX(0) scale(0.5);
            }
            20% {
                opacity: 1;
            }
            80% {
                opacity: 0.8;
            }
            100% {
                bottom: 100%;
                opacity: 0;
                transform: translateX(30px) scale(1);
            }
        }

        @keyframes floatHeart {
            0% {
                bottom: -30px;
                opacity: 0;
                transform: translateX(0) rotate(0deg) scale(0.5);
            }
            20% {
                opacity: 0.8;
            }
            80% {
                opacity: 0.6;
            }
            100% {
                bottom: 100%;
                opacity: 0;
                transform: translateX(-20px) rotate(20deg) scale(1);
            }
        }

        @keyframes pulse {
            0% {
                width: 100px;
                height: 100px;
                opacity: 0.8;
            }
            100% {
                width: 300px;
                height: 300px;
                opacity: 0;
            }
        }

        @keyframes ecgDraw {
            0% { stroke-dashoffset: 600; }
            100% { stroke-dashoffset: 0; }
        }

        @keyframes gradientText {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        @keyframes explode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* Hover effects */
        .heart:hover {
            animation: heartbeat 0.6s ease-in-out infinite;
            filter: drop-shadow(0 0 50px rgba(255, 0, 80, 0.9));
        }

        /* Glow effect */
        .glow {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 0, 80, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: glowPulse 2s ease-in-out infinite;
            z-index: 5;
        }

        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <!-- Anillos orbitales -->
        <div class="orbit"></div>
        <div class="orbit"></div>
        <div class="orbit"></div>
        
        <!-- Ondas de pulso -->
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        
        <!-- Efecto de brillo -->
        <div class="glow"></div>
        
        <!-- Corazón principal -->
        <div class="heart" id="heart">
            <div class="heart-shine"></div>
        </div>
        
        <!-- Partículas -->
        <div class="particles">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>
        
        <!-- Mini corazones -->
        <div class="mini-heart"></div>
        <div class="mini-heart"></div>
        <div class="mini-heart"></div>
        <div class="mini-heart"></div>
        <div class="mini-heart"></div>
        
        <!-- ECG -->
        <div class="ecg-container">
            <svg width="300" height="60" viewBox="0 0 300 60">
                <path class="ecg-line" 
                      d="M0,30 L30,30 L40,30 L50,25 L55,35 L60,10 L65,50 L70,30 L80,30 L100,30 L110,30 L120,25 L125,35 L130,10 L135,50 L140,30 L150,30 L170,30 L180,30 L190,25 L195,35 L200,10 L205,50 L210,30 L220,30 L240,30 L250,30 L260,25 L265,35 L270,10 L275,50 L280,30 L300,30"
                      stroke-dasharray="600"
                      stroke-dashoffset="600"/>
            </svg>
        </div>
        
        <!-- Texto -->
        <div class="love-text">LOVE</div>
    </div>

    <script>
        // Crear estrellas de fondo
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 100;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                star.style.animationDuration = (Math.random() * 2 + 1) + 's';
                starsContainer.appendChild(star);
            }
        }

        // Crear explosión de partículas
        function createExplosion(x, y) {
            const container = document.querySelector('.container');
            const particleCount = 20;
            const colors = ['#ff0050', '#ff3366', '#ff6b8a', '#ffb3c6', '#ffffff'];
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'explosion-particle';
                
                const angle = (Math.PI * 2 / particleCount) * i;
                const velocity = 50 + Math.random() * 100;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                
                particle.style.cssText = `
                    left: 50%;
                    top: 50%;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    --tx: ${tx}px;
                    --ty: ${ty}px;
                    box-shadow: 0 0 10px currentColor;
                `;
                
                container.appendChild(particle);
                
                setTimeout(() => particle.remove(), 1000);
            }
        }

        // Efecto de latido acelerado al hacer click
        const heart = document.getElementById('heart');
        let clickCount = 0;

        heart.addEventListener('click', function(e) {
            clickCount++;
            createExplosion(e.clientX, e.clientY);
            
            // Crear corazones extra que salen volando
            for (let i = 0; i < 5; i++) {
                setTimeout(() => createFlyingHeart(), i * 100);
            }
            
            // Cambiar color temporalmente
            this.style.filter = 'drop-shadow(0 0 60px rgba(255, 100, 150, 1)) hue-rotate(' + (clickCount * 30) + 'deg)';
            
            setTimeout(() => {
                this.style.filter = 'drop-shadow(0 0 30px rgba(255, 0, 80, 0.6))';
            }, 500);
        });

        // Crear corazón volador
        function createFlyingHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.cssText = `
                position: fixed;
                font-size: ${20 + Math.random() * 30}px;
                left: ${Math.random() * window.innerWidth}px;
                bottom: -50px;
                pointer-events: none;
                z-index: 1000;
                animation: flyUp ${3 + Math.random() * 2}s ease-out forwards;
            `;
            
            document.body.appendChild(heart);
            
            setTimeout(() => heart.remove(), 5000);
        }

        // Añadir keyframe dinámico para corazones voladores
        const style = document.createElement('style');
        style.textContent = `
            @keyframes flyUp {
                0% {
                    transform: translateY(0) rotate(0deg) scale(1);
                    opacity: 1;
                }
                100% {
                    transform: translateY(-${window.innerHeight + 100}px) rotate(${Math.random() > 0.5 ? '' : '-'}360deg) scale(0.5);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // Seguimiento del mouse para efecto parallax
        document.addEventListener('mousemove', (e) => {
            const container = document.querySelector('.container');
            const rect = container.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const deltaX = (e.clientX - centerX) / 30;
            const deltaY = (e.clientY - centerY) / 30;
            
            container.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
        });

        // Crear partículas continuamente
        function createContinuousParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.cssText = `
                position: fixed;
                left: ${Math.random() * 100}%;
                bottom: -10px;
                width: ${4 + Math.random() * 8}px;
                height: ${4 + Math.random() * 8}px;
                background: ${['#ff0050', '#ff3366', '#ff6b8a'][Math.floor(Math.random() * 3)]};
                border-radius: 50%;
                pointer-events: none;
                animation: float ${4 + Math.random() * 4}s ease-out forwards;
                opacity: 0;
            `;
            
            document.body.appendChild(particle);
            
            setTimeout(() => particle.remove(), 8000);
        }

        // Inicializar
        createStars();
        
        // Crear partículas cada cierto tiempo
        setInterval(createContinuousParticle, 300);

        // Audio visual feedback (simulated heartbeat sound indicator)
        let beatInterval = 1200;
        function visualBeat() {
            const glow = document.querySelector('.glow');
            glow.style.background = 'radial-gradient(circle, rgba(255, 0, 80, 0.6) 0%, transparent 70%)';
            
            setTimeout(() => {
                glow.style.background = 'radial-gradient(circle, rgba(255, 0, 80, 0.3) 0%, transparent 70%)';
            }, 150);
        }

        setInterval(visualBeat, beatInterval);

        // Easter egg: Konami code
        const konamiCode = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
        let konamiIndex = 0;

        document.addEventListener('keydown', (e) => {
            if (e.key === konamiCode[konamiIndex]) {
                konamiIndex++;
                if (konamiIndex === konamiCode.length) {
                    // Activar modo arcoíris
                    document.body.style.animation = 'rainbow 2s linear infinite';
                    const rainbowStyle = document.createElement('style');
                    rainbowStyle.textContent = `
                        @keyframes rainbow {
                            0% { filter: hue-rotate(0deg); }
                            100% { filter: hue-rotate(360deg); }
                        }
                    `;
                    document.head.appendChild(rainbowStyle);
                    
                    // Explosión masiva de corazones
                    for (let i = 0; i < 50; i++) {
                        setTimeout(() => createFlyingHeart(), i * 50);
                    }
                    
                    konamiIndex = 0;
                }
            } else {
                konamiIndex = 0;
            }
        });

        console.log('💖 Haz click en el corazón para ver la magia!');
        console.log('🎮 Pista: Prueba el código Konami...');
    </script>
</body>
</html>
